<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử đơn hàng - SweetCake</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div id="header-shared"></div>
    <script src="../header.js"></script>

    <div style="max-width: 1280px; margin: 0 auto; padding: 0 20px; box-sizing: border-box;">
        
        <div class="chu-thuong">
            Trang chủ <span style="color: #CEC4C9; margin: 0 8px;">&gt;</span> Tài khoản <span style="color: #CEC4C9; margin: 0 8px;">&gt;</span> Lịch sử đơn hàng
        </div>

        <div style="margin-bottom: 40px;">
            <h1 class="tieu-de-vua" style="margin: 0 0 10px 0;">Lịch sử mua hàng của bạn</h1>
            <div class="chu-thuong" style="line-height: 20px;">Quản lý và xem lại tất cả các đơn hàng bạn đã đặt tại SweetCake.</div>
        </div>

        <div class="thanh-bo-loc-tim-kiem" style="border: none; padding: 0; margin-bottom: 30px; gap: 20px;">
            <div class="hop-tim-kiem" style="flex: 1;">
                <input type="text" id="o-search" placeholder="Tra cứu theo mã đơn hàng hoặc tên bánh...">
                <i class="bi bi-search"></i>
            </div>
            <select id="o-status" class="chu-thuong" style="width: 320px; height: 47px; background-color: #7D562D; color: #FFFFFF; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; outline: none;">
                <option value="all" style="background-color: #ffffff; color: #2D1B10;">Tất cả trạng thái</option>
                <option value="received" style="background-color: #ffffff; color: #2D1B10;">Đã tiếp nhận</option>
                <option value="baking" style="background-color: #ffffff; color: #2D1B10;">Đang làm bánh</option>
                <option value="completed" style="background-color: #ffffff; color: #2D1B10;">Đã xong</option>
                <option value="delivering" style="background-color: #ffffff; color: #2D1B10;">Đang giao</option>
                <option value="delivered" style="background-color: #ffffff; color: #2D1B10;">Đã giao</option>
            </select>
        </div>

        <div id="danh-sach-don-hang" style="display: flex; flex-direction: column; gap: 25px; margin-bottom: 40px;"></div>

        <div id="vung-phan-trang" class="thanh-phan-trang" style="margin-top: 40px; margin-bottom: 80px;"></div>
        
    <div id="footer-shared"></div>
    <script src="../footer.js"></script>

    <script>
    const statusStyles = {
        "received": { text: "Đã tiếp nhận", bg: "#E8F0FE", color: "#1A73E8" },
        "baking": { text: "Đang làm bánh", bg: "#FEF3D6", color: "#B06000" },
        "completed": { text: "Đã xong", bg: "#E6F4EA", color: "#137333" },
        "delivering": { text: "Đang giao", bg: "#F3E8FD", color: "#A142F4" },
        "delivered": { text: "Đã giao", bg: "#E2EDD5", color: "#5B822D" }
    };

    // Cấu hình biến phục vụ phân trang
    // Cấu hình biến phục vụ phân trang
let currentPage = 1;
let currentStatus = "all";
let currentSearch = "";
const itemsPerPage = 5;
const token = localStorage.getItem("token"); // token đăng nhập lưu lúc user login

// Nếu chưa đăng nhập thì đưa về trang đăng nhập
if (!token) {
    alert("Vui lòng đăng nhập để xem lịch sử đơn hàng.");
    window.location.href = "../dang-ky-dang-nhap/dang-nhap.html";
}

function toggledanhsach(orderId) {
    const collapsedArea = document.getElementById(`collapsed-${orderId}`);
    const button = document.getElementById(`btn-${orderId}`);
    if (collapsedArea.style.display === "none") {
        collapsedArea.style.display = "block";
        button.innerHTML = `∧ Thu gọn`;
    } else {
        collapsedArea.style.display = "none";
        const itemCount = collapsedArea.getElementsByClassName('extra-item').length;
        button.innerHTML = `∨ Xem thêm (${itemCount})`;
    }
}

async function fetchOrders(page, status, search) {
    const params = new URLSearchParams({ page, limit: itemsPerPage, status, search });
    const res = await fetch(`http://localhost:3000/api/orders?${params}`, {
        headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) return { orders: [], pagination: { totalPages: 1, page: 1 } };
    return res.json();
}

function renderOrders(orders) {
    const container = document.getElementById('danh-sach-don-hang');

    if (orders.length === 0) {
        container.innerHTML = `<p class="chu-thuong" style="text-align:center; padding: 40px 0;">Bạn chưa có đơn hàng nào.</p>`;
        return;
    }

    container.innerHTML = orders.map((order, globalIndex) => {
        const style = statusStyles[order.status] || { text: order.status, bg: "#F6F3EF", color: "#2D1B10" };
        const extraItems = order.items && order.items.length > 1 ? order.items.slice(1) : [];
        const hasMore = extraItems.length > 0;
        const firstItem = order.items && order.items.length > 0 ? order.items[0] : {};

        return `
            <div style="background-color: #FFFFFF; border: 1px solid #ecd9cb; border-radius: 12px; padding: 24px 30px; box-shadow: 0 4px 15px rgba(45, 27, 16, 0.02);">
                <div style="display: grid; grid-template-columns: 1.5fr 1.5fr 2fr 1fr; border-bottom: 1px solid #F6F3EF; padding-bottom: 18px; align-items: center;">
                    <div>
                        <div class="chu-thuong" style="line-height: 16px; font-size: 11px; color: #7D757A; font-weight: bold;">MÃ ĐƠN HÀNG</div>
                        <div class="chu-thuong" style="line-height: 24px; font-weight: 700; color: #2D1B10;">${order.id}</div>
                    </div>
                    <div>
                        <div class="chu-thuong" style="line-height: 16px; font-size: 11px; color: #7D757A; font-weight: bold;">NGÀY ĐẶT</div>
                        <div class="chu-thuong" style="line-height: 24px; font-weight: 700; color: #2D1B10;">${new Date(order.created_at).toLocaleDateString('vi-VN')}</div>
                    </div>
                    <div>
                        <div class="chu-thuong" style="line-height: 16px; font-size: 11px; color: #7D757A; font-weight: bold; margin-bottom: 4px;">TRẠNG THÁI</div>
                        <span class="chu-thuong" style="background-color: ${style.bg}; color: ${style.color}; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; line-height: 16px; display: inline-flex; align-items: center; gap: 6px;">
                            <i class="bi bi-circle-fill" style="font-size: 6px;"></i> ${style.text}
                        </span>
                    </div>
                    <div style="text-align: right;">
                        <div class="chu-thuong" style="line-height: 16px; font-size: 11px; color: #7D757A; font-weight: bold;">TỔNG TIỀN</div>
                        <div class="tieu-de-nho" style="line-height: 24px; color: #7D562D; font-weight: 700; margin: 0;">${order.total_price}</div>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 20px;">
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <img src="${firstItem.image}" alt="Bánh SweetCake" style="width: 72px; height: 72px; border-radius: 8px; object-fit: cover;">
                        <div>
                            <div class="tieu-de-nho" style="line-height: 20px; margin: 0 0 4px 0; font-size: 16px;">${firstItem.product_name}</div>
                            <div class="chu-thuong" style="line-height: 16px; color: #7D757A;">Số lượng: ${firstItem.quantity}</div>
                            ${hasMore ? `<button id="btn-id-${globalIndex}" onclick="toggledanhsach('id-${globalIndex}')" class="chu-thuong" style="background: none; border: none; padding: 0; color: #7D562D; font-weight: bold; cursor: pointer; line-height: 20px; margin-top: 4px;">∨ Xem thêm (${extraItems.length})</button>` : ''}
                        </div>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button class="nut-bam" style="padding: 0 20px;" onclick="window.location.href='chi-tiet-don-hang.html?id=${order.id}'">Xem chi tiết</button>
                        <button class="nut-bam" style="padding: 0 20px;" onclick="reorder('${order.order_code}')">Mua lại</button>
                    </div>
                </div>

                <div id="collapsed-id-${globalIndex}" style="display: none;">
                    ${extraItems.map(item => `
                        <div class="extra-item" style="display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px dashed #F6F3EF; margin-top: 20px;">
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <img src="${item.image}" alt="Bánh SweetCake" style="width: 72px; height: 72px; border-radius: 8px; object-fit: cover;">
                                <div>
                                    <div class="tieu-de-nho" style="line-height: 20px; margin: 0 0 4px 0; font-size: 16px;">${item.product_name}</div>
                                    <div class="chu-thuong" style="line-height: 16px; color: #7D757A;">Số lượng: ${item.quantity}</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 12px;">
                                <button class="nut-bam" style="padding: 0 20px;" onclick="window.location.href='chi-tiet-don-hang.html?id=${order.id}'">Xem chi tiết</button>
                                <button class="nut-bam" style="padding: 0 20px;" onclick="reorder('${order.id}')">Mua lại</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }).join('');
}

function renderPagination(totalPages, current) {
    const paginationContainer = document.getElementById('vung-phan-trang');
    let html = `<div onclick="loadPage(${current - 1})" style="border: 1px solid #ecd9cb; cursor: pointer;"><i class="bi bi-chevron-left"></i></div>`;
    for (let i = 1; i <= totalPages; i++) {
        html += i === current
            ? `<div class="active">${i}</div>`
            : `<div onclick="loadPage(${i})" style="border: 1px solid #ecd9cb; cursor: pointer;">${i}</div>`;
    }
    html += `<div onclick="loadPage(${current + 1})" style="border: 1px solid #ecd9cb; cursor: pointer;"><i class="bi bi-chevron-right"></i></div>`;
    paginationContainer.innerHTML = html;
}

async function loadPage(page) {
    const { orders, pagination } = await fetchOrders(page, currentStatus, currentSearch);
    if (page < 1 || (pagination.totalPages && page > pagination.totalPages)) return;
    currentPage = pagination.page;
    renderOrders(orders);
    renderPagination(pagination.totalPages, pagination.page);
    document.getElementById('danh-sach-don-hang').scrollIntoView({ behavior: 'smooth' });
}

async function reorder(orderCode) {
    const res = await fetch(`http://localhost:3000/api/orders/${orderCode}/reorder`, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}` }
    });
    if (res.ok) alert("Đã thêm sản phẩm vào giỏ hàng!");
}

document.getElementById('o-search').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    loadPage(1);
});
document.getElementById('o-status').addEventListener('change', (e) => {
    currentStatus = e.target.value;
    loadPage(1);
});

loadPage(1);
</script>
</body>
</html>
