<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweetCake | Danh mục sản phẩm</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>
<body>
    <!-- ================= HEADER ================= -->
     <!-- <div id="header-placeholder"></div> -->
    <div id="header-shared"></div>
    <!-- ================= BREADCRUMB ================= -->
<!-- 
    <div class="breadcrumb chu-thuong">

        Trang chủ >

        <span>Menu</span>

    </div> -->


    <!-- ================= TITLE ================= -->

    <section class="page-title">

        <h1 class="tieu-de-vua">

            Danh mục sản phẩm

        </h1>

        <p class="chu-thuong">

            Khám phá các sản phẩm bánh ngọt được tạo nên từ đôi bàn tay khéo léo
            và tình yêu trọn vẹn.

        </p>

    </section>

    <div class="khung-chua-sp">

        <!-- ================= FILTER ================= -->

        <aside class="filter">

            <!-- Dịp -->

            <div class="filter-box">

                <h3>DỊP ĐẶC BIỆT</h3>

                <label>

                    <input type="checkbox" value="Sinh nhật" class="special">

                    Sinh nhật

                </label>

                <label>

                    <input type="checkbox" value="Kỷ niệm" class="special">

                    Kỷ niệm

                </label>

                <label>

                    <input type="checkbox" value="Tiệc cưới" class="special">

                    Tiệc cưới

                </label>

                <label>

                    <input type="checkbox" value="Valentine" class="special">

                    Valentine

                </label>

            </div>


            <!-- Nhân -->

            <div class="filter-box">

                <h3>NHÂN BÁNH</h3>

                <label>

                    <input type="checkbox" value="Bắp" class="flavor">

                    Bắp

                </label>

                <label>

                    <input type="checkbox" value="Matcha" class="flavor">

                    Matcha

                </label>

                <label>

                    <input type="checkbox" value="Phô mai" class="flavor">

                    Phô mai

                </label>

                <label>

                    <input type="checkbox" value="Trái cây tươi" class="flavor">

                    Trái cây tươi

                </label>

                <label>

                    <input type="checkbox" value="Socola" class="flavor">

                    Socola

                </label>

            </div>


            <!-- Loại -->

            <div class="filter-box">

                <h3>LOẠI BÁNH</h3>

                <label>

                    <input type="checkbox" value="Bông lan" class="type">

                    Bông lan

                </label>

                <label>

                    <input type="checkbox" value="Mousse" class="type">

                    Mousse

                </label>

                <label>

                    <input type="checkbox" value="Bento" class="type">

                    Bento

                </label>

            </div>


            <!-- Giá -->

            <div class="filter-box">

                <h3>GIÁ</h3>

                <label>

                    <input type="checkbox"  class="price" name="price" value="200000">

                    Dưới 200.000

                </label>

                <label>

                    <input type="checkbox" class="price"  name="price" value="300000">

                    200.000 - 300.000

                </label>

                <label>

                    <input type="checkbox"  class="price"  name="price" value="400000">

                    300.000 - 400.000

                </label>

                <label>

                    <input type="checkbox"  class="price" name="price" value="500000">

                    400.000 - 500.000 

                </label>

                <label>

                    <input type="checkbox"  class="price"  name="price" value="999999999">

                    Trên 500.000

                </label>

            </div>

        </aside>



        <!-- ================= CONTENT ================= -->

        <main class="product-section">


            <!-- Search -->

            <div class="top-bar">

                <input
                    type="text"
                    id="search"
                    class="dong-nhap-lieu"
                    placeholder="Tìm kiếm sản phẩm">

                <select id="sort">

                    <option value="default">

                        Mới nhất

                    </option>

                    <option value="low">

                        Giá tăng dần

                    </option>

                    <option value="high">

                        Giá giảm dần

                    </option>

                </select>

            </div>


            <!-- Grid -->

            <div id="product-grid">

                <!-- JS render -->

            </div>


        </main>

    </div>

    <!-- ================= FOOTER ================= -->
<div id="footer-shared"></div>
    <!-- <script src="../header.js"></script> -->
    <!-- <script src="../loadheader.js"></script> -->
      <script src="../header.js"></script>
    <script src="menu.js"></script>
    <script src="../footer.js"></script>
</body>

</html>
