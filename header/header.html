  <style> 
  /* KHUNG MENU THẢ XUỐNG */
.khung-menu-tha-lon {
    position: absolute;
    top: 100%; 
    left: 0;
    width: 100%;
    background-color: #fff;
    z-index: 999;
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
    border-top: 1px solid #f2e7df;
    display: none;
    border-radius: 12px;
}

.hop-chia-hai-vung-menu {
            display: flex;
            width: 100%;
        }

        .vung-danh-muc-trai {
            width: 20%;
            background-color: #F6F3EF;
            padding: 40px 0 40px 0px;
            display: flex;
            flex-direction: column;
            gap: 0px;
        }

        .vung-danh-muc-trai  a {
            display:block;
            padding: 10px 20px 10px 35px;            
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: #2D1B10;
            letter-spacing: -0.01em;
            text-decoration: none;
            font-weight: 100 !important;
        }

        .vung-danh-muc-trai a:hover {
            background-color: #FFFFFF;
        }

        .vung-danh-muc-trai a.dang-chon {
            color: #2D1B10;
            font-weight: 700;
            border-right: 3px solid #7a5232;
        }

        .vung-hien-thi-phai {
            width: 76%;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
        }

        .chu-de-muc-menu-phai {
            margin-bottom: 25px;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #2D1B10;
            font-weight: 300;
            letter-spacing: -0.01em;
            border-bottom: 1px solid #f2e7df; 
            padding-bottom: 10px;
        }

        .luoi-hai-cot-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            row-gap: 25px;
            column-gap: 40px;
            margin-bottom: 35px;
        } 
        .dong-chi-tiet-mon-an {
            /* Dung de can anh tron va chu luon nam ngang hàng voi nhau */
            display: flex;
            align-items: center;
            gap: 15px;
            wrap: wrap;
        }

        .dong-chi-tiet-mon-an img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chu-khoi-mon-an h4 {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            color: #2D1B10;
            margin-bottom: 3px;
            font-weight: bold;
        }

        .chu-khoi-mon-an p {
            font-size: 12px;
            color: #777;
            line-height: 1.4;
        }

        .hop-banner-nho-uu-dai {
            background-color: #fdf5f7;
            border-radius: 8px;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .thanh-day-menu-duoi {
            background-color: #2D1B10;
color: #fff;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border-radius: 0 0 12px 12px;
        }

        .thanh-day-menu-duoi .nhom-icon-m-duoi {
            display: flex;
            gap: 15px;
            font-size: 15px;
        }
        a {
          text-decoration: none;
        }
  </style>
</head>
