.anh-goc {
  position: absolute;
  width: 260px;
  height: 200px;
  border-radius: 16px;
  background-size: cover;
  background-position: center;
  opacity: 0.9;
  z-index: 0;
}
.anh-goc--trai {
  top: 20px;
  left: -40px;
  transform: rotate(-8deg);
  background-image: linear-gradient(135deg, #EADFD2, #C9A98C);
}
.anh-goc--phai {
  bottom: 20px;
  right: -40px;
  transform: rotate(8deg);
  background-image: linear-gradient(135deg, #6B4A34, #3E2415);
}
.form-dang-ky .dong-nhap-lieu{
    width: 100%;
    box-sizing: border-box;
    padding: 0 16px;
}

.dong-checkbox {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin: 20px 0 24px;
  cursor: pointer;
}
.dong-checkbox input {
  margin-top: 3px;
  width: 16px;
  height: 16px;
  accent-color: #7D562D;
}
.dong-checkbox .chu-thuong { line-height: 20px; }

@media (max-width: 900px) {
  .anh-goc { display: none; }
}

      </form>

          Facebook

      <p class="chu-thuong lien-ket-dang-nhap">Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập ngay</a></p>
    </div>

    // Ẩn/hiện mật khẩu
    document.querySelectorAll('.nut-an-hien-mat-khau').forEach((nut) => {
      nut.addEventListener('click', () => {
        const idOMucTieu = nut.getAttribute('data-target');
        const oInput = document.getElementById(idOMucTieu);
        const icon = nut.querySelector('i');
        
        if (!oInput || !icon) return;

        if (oInput.type === 'password') {
          oInput.type = 'text';
          icon.classList.remove('bi-eye');
          icon.classList.add('bi-eye-slash');
          nut.setAttribute('aria-label', 'Ẩn mật khẩu');
        } else {
          oInput.type = 'password';
          icon.classList.remove('bi-eye-slash');
          icon.classList.add('bi-eye');
          nut.setAttribute('aria-label', 'Hiện mật khẩu');
        }
      });
    });
    
        document.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('.form-dang-ky');
        const nutDangKy = document.querySelector('.nut-dang-ky');
        
        const fullnameInput = document.getElementById('fullname');
        const phoneInput = document.getElementById('phone');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const agreeCheckbox = document.getElementById('agree');

        // Map tên field trả về từ server -> ô input tương ứng trên form,
        // để hiện lỗi (VD: "Số điện thoại đã được đăng ký") đúng ngay dưới ô đó
        const banDoTruong = {
          fullname: fullnameInput,
          phone: phoneInput,
          email: emailInput,
          password: passwordInput
        };

        // Regex kiểm tra định dạng email cơ bản
        const KIEU_EMAIL_HOP_LE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // Tự động focus vào họ tên
        if (fullnameInput) fullnameInput.focus();

        // ==================== HIỂN THỊ LỖI ====================
        function hienThiLoi(oInput, noiDung) {
          if (!oInput) return;
          oInput.classList.add('dong-nhap-lieu-loi');
          
          // Tạo hoặc cập nhật thông báo lỗi
          let thongBao = oInput.parentElement.querySelector('.chu-loi');
          if (!thongBao) {
            thongBao = document.createElement('p');
            thongBao.className = 'chu-loi';
            oInput.parentElement.appendChild(thongBao);
          }
          thongBao.textContent = noiDung;
        }

        function xoaLoi(oInput) {
          if (!oInput) return;
          oInput.classList.remove('dong-nhap-lieu-loi');
          const thongBao = oInput.parentElement.querySelector('.chu-loi');
          if (thongBao) thongBao.textContent = '';
        }

        // ==================== KIỂM TRA DỮ LIỆU (PHÍA TRÌNH DUYỆT) ====================
        function kiemTraForm() {
          let hopLe = true;

          xoaLoi(fullnameInput);
          xoaLoi(phoneInput);
          xoaLoi(emailInput);
          xoaLoi(passwordInput);

          // Họ và tên
          if (!fullnameInput.value.trim()) {
            hienThiLoi(fullnameInput, 'Vui lòng nhập họ và tên.');
            hopLe = false;
          }

          // Số điện thoại
          const sdt = phoneInput.value.trim().replace(/\s+/g, '');
          if (!sdt) {
            hienThiLoi(phoneInput, 'Vui lòng nhập số điện thoại.');
            hopLe = false;
          } else if (!/^[0-9]{10,11}$/.test(sdt)) {
            hienThiLoi(phoneInput, 'Số điện thoại phải là 10 hoặc 11 chữ số.');
            hopLe = false;
          }

          // Email (tuỳ chọn, nhưng nếu có nhập thì phải đúng định dạng)
          const emailVal = emailInput.value.trim();
          if (emailVal && !KIEU_EMAIL_HOP_LE.test(emailVal)) {
            hienThiLoi(emailInput, 'Email không đúng định dạng.');
            hopLe = false;
          }

          // Mật khẩu
          if (!passwordInput.value) {
            hienThiLoi(passwordInput, 'Vui lòng nhập mật khẩu.');
            hopLe = false;
          } else if (passwordInput.value.length < 8 || 
                    !/[A-Z]/.test(passwordInput.value) || 
                    !/[0-9]/.test(passwordInput.value)) {
            hienThiLoi(passwordInput, 'Mật khẩu phải có ít nhất 8 ký tự, 1 chữ hoa và 1 số.');
            hopLe = false;
          }

          if (!agreeCheckbox.checked) {
            alert('Bạn phải đồng ý với điều khoản và chính sách bảo mật để tiếp tục.');
            hopLe = false;
          }

          return hopLe;
        }

        // ==================== GỬI DỮ LIỆU LÊN SERVER ====================
        async function dangKyTaiKhoan() {
          nutDangKy.disabled = true;
          nutDangKy.textContent = 'ĐANG ĐĂNG KÝ...';

          try {
            const res = await fetch('http://localhost:3000/auth/dang-ky', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: fullnameInput.value.trim(),
                phone: phoneInput.value.trim(),
                email: emailInput.value.trim(),
                password: passwordInput.value
              })
            });

            const data = await res.json();

            if (res.ok && data.success) {
              nutDangKy.textContent = 'ĐĂNG KÝ THÀNH CÔNG!';
              nutDangKy.style.backgroundColor = '#2D1B10';

              // Thông báo thành công
              setTimeout(() => {
                alert('Đăng ký thành công!');
                window.location.href = '#';  // Chuyển hướng tới trang chủ
              }, 800);
              return;
            }

            // Server trả lỗi kèm "field" -> hiện ngay dưới ô input tương ứng
            // (VD: SĐT/email đã được đăng ký, mật khẩu chưa đạt yêu cầu...)
            if (data.field && banDoTruong[data.field]) {
              hienThiLoi(banDoTruong[data.field], data.message || 'Dữ liệu không hợp lệ.');
            } else {
              alert(data.message || 'Đăng ký thất bại, vui lòng thử lại.');
            }

            nutDangKy.disabled = false;
            nutDangKy.textContent = 'ĐĂNG KÝ NGAY';

          } catch (err) {
            console.error(err);
            alert('Không thể kết nối tới máy chủ, vui lòng thử lại sau.');
            nutDangKy.disabled = false;
            nutDangKy.textContent = 'ĐĂNG KÝ NGAY';
          }
        }

        // ==================== XỬ LÝ SUBMIT ====================
        form.addEventListener('submit', async (e) => {
          e.preventDefault();

          if (kiemTraForm()) {
            await dangKyTaiKhoan();
          }
        });

        // Xóa lỗi khi người dùng gõ lại
        [fullnameInput, phoneInput, emailInput, passwordInput].forEach(input => {
          if (input) {
            input.addEventListener('input', () => xoaLoi(input));
          }
        });

       
  });
    </script>
